name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check skillctl/ plugin/ tests/

      - name: Format check
        run: ruff format --check skillctl/ plugin/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev,plugin,optimize]" pyright

      - name: Type check
        run: pyright skillctl/ --pythonversion 3.10

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev,plugin,optimize]" pytest-cov

      - name: Run tests
        if: matrix.python-version != '3.13'
        run: pytest tests/ --ignore=tests/test_github_backend.py -m "not integration" -q

      - name: Run tests with coverage
        if: matrix.python-version == '3.13'
        run: pytest tests/ --ignore=tests/test_github_backend.py -m "not integration" -q --cov=skillctl --cov-report=term-missing:skip-covered

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[all]" pip-audit

      - name: Audit dependencies
        run: pip-audit

  dogfood-audit:
    # Audit the example skills shipped in `examples/` using the
    # in-tree wheel.  Dogfoods the headline value prop — if the example
    # skills stop auditing clean, the README's pitch stops being true
    # and CI catches it.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with: { python-version: '3.13' }

      - name: Install skillsops from this commit
        run: pip install -e .

      - name: Audit example skills
        run: |
          skillctl eval audit \
            examples/api-design-reviewer \
            examples/dependency-scanner \
            examples/tdd-workflow \
            --fail-on-warning

  build-smoke:
    # Build the sdist + wheel from a clean checkout, install only the
    # wheel (no editable install, no source checkout on the install side),
    # and verify the entry point resolves and reports the same version.
    # This catches pyproject/MANIFEST regressions that the editable
    # install hides — e.g. stale egg-info or rename-related artifacts.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Install built wheel in a fresh venv
        run: |
          set -euo pipefail
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install --upgrade pip
          /tmp/smoke-venv/bin/pip install dist/skillsops-*.whl

      - name: Verify console script resolves and version matches source
        run: |
          set -euo pipefail
          source_version=$(python -c "from skillctl.version import __version__; print(__version__)")
          installed_version=$(/tmp/smoke-venv/bin/skillctl version | awk '{print $2}')
          echo "source=$source_version installed=$installed_version"
          /tmp/smoke-venv/bin/skillctl --help > /dev/null
          test "$source_version" = "$installed_version"
