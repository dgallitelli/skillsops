name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check skillctl/ plugin/ tests/

      - name: Format check
        run: ruff format --check skillctl/ plugin/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev,plugin,optimize]" pyright

      - name: Type check
        run: pyright skillctl/ --pythonversion 3.10

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev,plugin,optimize]" pytest-cov

      - name: Run tests
        if: matrix.python-version != '3.13'
        run: pytest tests/ --ignore=tests/test_github_backend.py -m "not integration" -q

      - name: Run tests with coverage
        if: matrix.python-version == '3.13'
        run: pytest tests/ --ignore=tests/test_github_backend.py -m "not integration" -q --cov=skillctl --cov-report=term-missing:skip-covered

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[all]" pip-audit

      - name: Audit dependencies
        run: pip-audit
