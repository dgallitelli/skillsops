name: 'SkillsOps audit'
description: 'Run skillctl eval audit on agent skills and fail the build on findings.'
author: 'SkillsOps maintainers'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  paths:
    description: |
      Whitespace-separated list of paths to audit.  Each path can be a
      skill directory or a glob expanded by the shell.  Defaults to
      `./skills` if it exists, otherwise the repository root.
    required: false
    default: ''
  fail-on-warning:
    description: 'Fail the build on WARNING findings as well as CRITICAL.'
    required: false
    default: 'true'
  min-score:
    description: |
      Minimum acceptable audit score (0-100); below this the build fails.
      Leave empty to defer to .skilleval.yaml in each skill directory.
    required: false
    default: ''
  skillsops-version:
    description: |
      Pin the skillsops PyPI release used for the audit.  Examples:
      `latest` (default), `0.1.0b4`, `>=0.1.0b4,<0.2`.
    required: false
    default: 'latest'
  python-version:
    description: 'Python interpreter version installed by setup-python.'
    required: false
    default: '3.13'
  format:
    description: 'Output format passed to `skillctl eval audit --format`. One of `text`, `json`, `html`.'
    required: false
    default: 'text'

outputs:
  summary:
    description: 'Human-readable one-line summary of the audit run.'
    value: ${{ steps.audit.outputs.summary }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install skillsops
      shell: bash
      env:
        SKILLSOPS_VERSION: ${{ inputs.skillsops-version }}
      run: |
        set -euo pipefail
        # Build a single PEP 440 requirement string.  If the input starts
        # with one of <, <=, ==, >=, >, !=, ~=, it's already a constraint
        # and we pass it through verbatim.  Otherwise treat it as a
        # version pin (`pip install skillsops==X`).  `latest` means an
        # unconstrained install.
        case "$SKILLSOPS_VERSION" in
          latest)        spec="skillsops" ;;
          [\<\>\!\~\=]*) spec="skillsops${SKILLSOPS_VERSION}" ;;
          *)             spec="skillsops==${SKILLSOPS_VERSION}" ;;
        esac
        echo "Installing: $spec"
        pip install --upgrade "$spec"
        skillctl version

    - name: Resolve audit paths
      id: paths
      shell: bash
      run: |
        set -euo pipefail
        paths='${{ inputs.paths }}'
        if [ -z "${paths// /}" ]; then
          if [ -d skills ]; then
            paths="skills"
          else
            paths="."
          fi
        fi
        echo "resolved=$paths" >> "$GITHUB_OUTPUT"
        echo "Auditing: $paths"

    - name: Run skillctl eval audit
      id: audit
      shell: bash
      run: |
        set -euo pipefail
        args=()
        if [ "${{ inputs.fail-on-warning }}" = "true" ]; then
          args+=(--fail-on-warning)
        fi
        if [ -n "${{ inputs.min-score }}" ]; then
          args+=(--min-score "${{ inputs.min-score }}")
        fi
        args+=(--format "${{ inputs.format }}")
        # shellcheck disable=SC2086
        skillctl eval audit ${{ steps.paths.outputs.resolved }} "${args[@]}"
        echo "summary=audited ${{ steps.paths.outputs.resolved }}" >> "$GITHUB_OUTPUT"
