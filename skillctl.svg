<svg width="340" height="225" viewBox="30 12 340 218" xmlns="http://www.w3.org/2000/svg">
  <!-- No background — transparent -->

  <!-- Left bracket -->
  <path d="M60 30 L40 30 L40 140 L60 140" fill="none" stroke="#00FF88" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right bracket -->
  <path d="M340 30 L360 30 L360 140 L340 140" fill="none" stroke="#00FF88" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Central hexagon (skill node) -->
  <polygon points="200,18 234,37 234,75 200,94 166,75 166,37" fill="none" stroke="#00FF88" stroke-width="2.5"/>
  <polygon points="200,30 222,42 222,67 200,79 178,67 178,42" fill="#00FF88" opacity="0.08"/>
  <!-- Inner dot -->
  <circle cx="200" cy="56" r="7" fill="#00FF88" opacity="0.9"/>
  <!-- Inner ring -->
  <circle cx="200" cy="56" r="14" fill="none" stroke="#00FF88" stroke-width="1.2" opacity="0.5" stroke-dasharray="3 3"/>

  <!-- Connector lines from hex to brackets -->
  <line x1="166" y1="56" x2="60" y2="56" stroke="#00FF88" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  <line x1="234" y1="56" x2="340" y2="56" stroke="#00FF88" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>

  <!-- Tiny skill nodes on connector lines -->
  <circle cx="108" cy="56" r="4" fill="#00FF88" opacity="0.7"/>
  <circle cx="92" cy="56" r="2.5" fill="#00FF88" opacity="0.4"/>
  <circle cx="292" cy="56" r="4" fill="#00FF88" opacity="0.7"/>
  <circle cx="308" cy="56" r="2.5" fill="#00FF88" opacity="0.4"/>

  <!-- Logotype -->
  <text x="200" y="148" text-anchor="middle" font-family="'Courier New', monospace" font-size="38" font-weight="700" fill="#E8F4F0" letter-spacing="-1">skillctl</text>

  <!-- Tagline -->
  <text x="200" y="178" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#00FF88" opacity="0.7" letter-spacing="1">manage · deploy · control</text>

  <!-- Version badge -->
  <rect x="168" y="198" width="64" height="22" rx="11" fill="none" stroke="#00FF88" stroke-width="1" opacity="0.5"/>
  <text x="200" y="213" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#00FF88" opacity="0.7">v0.1.2</text>
</svg>
