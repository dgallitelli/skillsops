<svg width="380" height="195" viewBox="10 12 380 188" xmlns="http://www.w3.org/2000/svg">
  <!-- No background — transparent -->

  <!-- Left bracket -->
  <path d="M60 30 L40 30 L40 140 L60 140" fill="none" stroke="#6cb4ee" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right bracket -->
  <path d="M340 30 L360 30 L360 140 L340 140" fill="none" stroke="#6cb4ee" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Central hexagon (skill node) -->
  <polygon points="200,18 234,37 234,75 200,94 166,75 166,37" fill="none" stroke="#6cb4ee" stroke-width="2.5"/>
  <polygon points="200,30 222,42 222,67 200,79 178,67 178,42" fill="#6cb4ee" opacity="0.08"/>
  <!-- Inner dot -->
  <circle cx="200" cy="56" r="7" fill="#6cb4ee" opacity="0.9"/>
  <!-- Inner ring -->
  <circle cx="200" cy="56" r="14" fill="none" stroke="#6cb4ee" stroke-width="1.2" opacity="0.5" stroke-dasharray="3 3"/>

  <!-- Connector lines from hex to brackets -->
  <line x1="166" y1="56" x2="60" y2="56" stroke="#6cb4ee" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  <line x1="234" y1="56" x2="340" y2="56" stroke="#6cb4ee" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>

  <!-- Tiny skill nodes on connector lines -->
  <circle cx="108" cy="56" r="4" fill="#6cb4ee" opacity="0.7"/>
  <circle cx="92" cy="56" r="2.5" fill="#6cb4ee" opacity="0.4"/>
  <circle cx="292" cy="56" r="4" fill="#6cb4ee" opacity="0.7"/>
  <circle cx="308" cy="56" r="2.5" fill="#6cb4ee" opacity="0.4"/>

  <!-- Logotype -->
  <text x="200" y="148" text-anchor="middle" font-family="'Courier New', monospace" font-size="38" font-weight="700" fill="#E8F0F8" letter-spacing="-1">skillsops</text>

  <!-- Tagline -->
  <text x="200" y="178" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#6cb4ee" opacity="0.7" letter-spacing="1">validate · evaluate · distribute</text>
</svg>
